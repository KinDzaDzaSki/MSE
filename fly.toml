# Fly.io app configuration — free tier (no trial expiry).
# Deploy: install flyctl, then `fly launch` (first time) or `fly deploy`.
# The Postgres attachment is created by `fly postgres create` + `fly attach`.

app = "mse-clone"
primary_region = "fra"  # Frankfurt — closest EU region to Skopje

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.concurrency]]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
