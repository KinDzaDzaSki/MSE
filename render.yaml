# Render deployment blueprint — push this repo to deploy automatically.
# Connect the repo at https://dashboard.render.com/ and Render will use this file.

services:
  - type: web
    name: mse-clone
    runtime: node
    plan: starter # free tier while in trial; switch to "free" if available
    region: frankfurt # closest EU region to Skopje
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: mse-db
          property: connectionString

databases:
  - name: mse-db
    databaseName: mse
    user: mse
    plan: free
    region: frankfurt
