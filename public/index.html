<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MSE Clone — Macedonian Stock Exchange</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23c8102e'/%3E%3Cg stroke='%23ffeb3b' stroke-width='1.6' stroke-linecap='round'%3E%3Cline x1='16' y1='4' x2='16' y2='9'/%3E%3Cline x1='16' y1='23' x2='16' y2='28'/%3E%3Cline x1='4' y1='16' x2='9' y2='16'/%3E%3Cline x1='23' y1='16' x2='28' y2='16'/%3E%3Cline x1='7.5' y1='7.5' x2='11' y2='11'/%3E%3Cline x1='21' y1='21' x2='24.5' y2='24.5'/%3E%3Cline x1='7.5' y1='24.5' x2='11' y2='21'/%3E%3Cline x1='21' y1='11' x2='24.5' y2='7.5'/%3E%3C/g%3E%3Ctext x='16' y='21' text-anchor='middle' font-size='13' font-weight='800' fill='%23ffeb3b' font-family='-apple-system,sans-serif'%3EM%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="brand-text">
      <span class="brand-name">MSE Clone</span>
      <span class="brand-sub">Македонска берза</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="market-status" id="marketStatus">—</div>
    <div class="mbi-chip" id="mbiChip"></div>
    <button class="lang-toggle" id="langToggle">МК</button>
  </div>
</header>

<main class="layout">
  <!-- LEFT: MAIN TABLE -->
  <section class="main-panel">
    <div class="toolbar">
      <div class="search-wrapper">
        <input id="search" class="search" placeholder="Search ticker or company…" />
      </div>
      <span class="muted" id="lastPoll"></span>
    </div>
    <div class="table-wrap">
      <table class="quotes">
        <thead>
          <tr>
            <th data-sort="symbol">Symbol</th>
            <th data-sort="name">Name</th>
            <th class="spark-th"></th>
            <th class="num" data-sort="lastPrice">Price</th>
            <th class="num" data-sort="dailyChange">Change</th>
            <th class="num" data-sort="changePct">Change %</th>
            <th class="num" data-sort="volume">Volume</th>
            <th class="num" data-sort="week52Chg">52 Wk Change %</th>
            <th class="wk-range" data-sort="week52Min">52 Wk Range</th>
          </tr>
        </thead>
        <tbody id="quotesBody"></tbody>
      </table>
    </div>
  </section>

  <!-- RIGHT: SIDEBAR PANELS -->
  <aside class="sidebar">
    <div class="side-card" id="gainersCard">
      <h3 class="side-title">Top gainers</h3>
      <div class="side-items" id="gainersItems"></div>
    </div>
    <div class="side-card" id="losersCard">
      <h3 class="side-title">Top losers</h3>
      <div class="side-items" id="losersItems"></div>
    </div>
    <div class="side-card" id="activeCard">
      <h3 class="side-title">Most active</h3>
      <div class="side-items" id="activeItems"></div>
    </div>
  </aside>
</main>

<!-- COMPANY MODAL -->
<div id="companyModal" class="modal hidden">
  <div class="modal-card">
    <button class="close" id="modalClose">×</button>
    <div id="companyContent"></div>
  </div>
</div>

<footer class="foot">
  Data scraped from <a href="https://www.mse.mk" target="_blank" rel="noopener">mse.mk</a> — free public end-of-day data — for educational use.
</footer>

<script src="/app.js"></script>
</body>
</html>
